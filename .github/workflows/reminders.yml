name: Telegram reminders

on:
  schedule:
    - cron: "0 6,9,12,15 * * *"
    - cron: "15 6,9,12,15 * * *"
    - cron: "30 6,9,12,15 * * *"
  workflow_dispatch:

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Restore last-reminder state
        uses: actions/cache@v4
        with:
          path: .last-reminder
          key: last-reminder-${{ github.run_id }}
          restore-keys: |
            last-reminder-

      - name: Send Telegram reminder
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python cloud/send_reminder.py
